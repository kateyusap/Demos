  <style>
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
    #content    { flex: 1; min-height: 0; }

    /* ── TEST-MODE banner ── */
    #test-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: #fff3cd;
      border-top: 1px solid #ffc107;
      padding: 6px 40px 6px 16px;
      font-family: "72", Arial, sans-serif;
      font-size: 12px;
      color: #856404;
      text-align: center;
      white-space: normal;
      transition: opacity 0.4s ease, max-height 0.4s ease, padding 0.4s ease;
      overflow: hidden;
      max-height: 60px;
      opacity: 1;
    }
    #test-banner.bn-banner-hidden {
      opacity: 0;
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
    }
    #test-banner-close {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #856404;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
      opacity: 0.7;
    }
    #test-banner-close:hover { opacity: 1; background: rgba(133,100,4,0.1); }
  </style>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var bUpdating = false;
      new MutationObserver(function () {
        if (bUpdating) { return; }
        bUpdating = true;
        document.querySelectorAll(".sapMGrowingListTriggerText .sapMSLITitle").forEach(function (el) {
          if (/\(\d+\)\s*$/.test(el.textContent)) {
            el.textContent = el.textContent.replace(/\s*\(\d+\)\s*$/, "");
          }
        });
        bUpdating = false;
      }).observe(document.body, { childList: true, subtree: true, characterData: true });

      /* Banner close / reopen */
      var _bannerClosedByUser = false;
      var closeBtn = document.getElementById("test-banner-close");
      var banner = document.getElementById("test-banner");
      if (closeBtn && banner) {
        closeBtn.addEventListener("click", function () {
          _bannerClosedByUser = true;
          banner.classList.add("bn-banner-hidden");
        });
      }
      /* Expose reopen so external code (e.g. Joule close) can call it */
      window._reopenTestBanner = function () {
        if (!_bannerClosedByUser) {
          banner && banner.classList.remove("bn-banner-hidden");
        }
      };
      window._closeTestBanner = function () {
        banner && banner.classList.add("bn-banner-hidden");
      };

      /* Banner fade: hide when Joule opens, restore when Joule closes */
      var _origToggle = null;
      var _hookInterval = setInterval(function () {
        if (typeof window._ocJouleToggle !== "function") { return; }
        clearInterval(_hookInterval);
        _origToggle = window._ocJouleToggle;
        window._ocJouleToggle = function () {
          _origToggle();
          var jouleWrap = document.getElementById("oc-joule") &&
                          document.getElementById("oc-joule").parentElement;
          var opened = jouleWrap && jouleWrap.style.display !== "none";
          if (opened) {
            window._closeTestBanner();
          } else {
            window._reopenTestBanner();
          }
        };
      }, 100);
    });
  </script>
</head>
<body class="sapUiBody sapUiSizeCompact">
  <div id="content"></div>
  <div id="test-banner">
    Test Build – Internal testing version.<!-- Kate Yu -->
    <button id="test-banner-close" title="Dismiss">&#x2715;</button>
  </div>
</body>
